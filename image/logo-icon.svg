<svg viewBox="0 0 300 235" xmlns="http://www.w3.org/2000/svg">

  <!-- GOLD CIRCLE (center top) -->
  <circle cx="150" cy="50" r="24" fill="#D4A840"/>

  <!-- DECORATIVE STARS -->
  <!-- Teal star top-right -->
  <polygon points="270,22 272.5,34 284,34 275,41 278,53 270,46 262,53 265,41 256,34 267.5,34" fill="#4E9898"/>
  <!-- Coral star top-left -->
  <polygon points="32,36 34.5,48 46,48 37,55 40,67 32,60 24,67 27,55 18,48 29.5,48" fill="#C87060"/>
  <!-- Small coral star upper-center-right -->
  <polygon points="200,18 201.5,24 208,24 203,28 205,34 200,30 195,34 197,28 192,24 198.5,24" fill="#C87060"/>

  <!-- DECORATIVE DOTS -->
  <circle cx="18"  cy="100" r="5.5" fill="#4E9898"/>
  <circle cx="282" cy="95"  r="5.5" fill="#C87060"/>
  <circle cx="113" cy="18"  r="5"   fill="#C87060"/>
  <circle cx="186" cy="20"  r="4.5" fill="#4E9898"/>
  <circle cx="255" cy="68"  r="4"   fill="#C87060"/>
  <circle cx="46"  cy="75"  r="3.5" fill="#D4A840"/>

  <!-- LEFT FIGURE (Coral) - large, arms raised wide -->
  <g stroke="#C87060" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- torso -->
    <line x1="75" y1="100" x2="75" y2="158" stroke-width="26"/>
    <!-- left arm -->
    <line x1="66" y1="114" x2="24"  y2="72"  stroke-width="22"/>
    <!-- right arm -->
    <line x1="84" y1="114" x2="126" y2="72"  stroke-width="22"/>
    <!-- left leg -->
    <line x1="75" y1="156" x2="47"  y2="202" stroke-width="24"/>
    <!-- right leg -->
    <line x1="75" y1="156" x2="103" y2="202" stroke-width="24"/>
  </g>
  <!-- head -->
  <circle cx="75" cy="76" r="21" fill="#C87060"/>

  <!-- RIGHT FIGURE (Teal) - large, arms raised wide -->
  <g stroke="#4E9898" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- torso -->
    <line x1="225" y1="100" x2="225" y2="158" stroke-width="26"/>
    <!-- left arm -->
    <line x1="216" y1="114" x2="174" y2="72"  stroke-width="22"/>
    <!-- right arm -->
    <line x1="234" y1="114" x2="276" y2="72"  stroke-width="22"/>
    <!-- left leg -->
    <line x1="225" y1="156" x2="197" y2="202" stroke-width="24"/>
    <!-- right leg -->
    <line x1="225" y1="156" x2="253" y2="202" stroke-width="24"/>
  </g>
  <!-- head -->
  <circle cx="225" cy="76" r="21" fill="#4E9898"/>

  <!-- MIDDLE FIGURE (Gold) - smaller, lower, between the two -->
  <g stroke="#D4A840" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- torso -->
    <line x1="150" y1="158" x2="150" y2="200" stroke-width="18"/>
    <!-- left arm -->
    <line x1="144" y1="166" x2="120" y2="148" stroke-width="16"/>
    <!-- right arm -->
    <line x1="156" y1="166" x2="180" y2="148" stroke-width="16"/>
    <!-- left leg -->
    <line x1="150" y1="198" x2="131" y2="224" stroke-width="17"/>
    <!-- right leg -->
    <line x1="150" y1="198" x2="169" y2="224" stroke-width="17"/>
  </g>
  <!-- head -->
  <circle cx="150" cy="142" r="14" fill="#D4A840"/>

</svg>
